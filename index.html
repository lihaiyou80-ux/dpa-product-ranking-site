<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>珠宝配饰行业跑品榜单</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(17, 24, 39, 0.88);
      --panel-2: rgba(15, 23, 42, 0.9);
      --line: rgba(148, 163, 184, 0.18);
      --text: #e5eefc;
      --muted: #94a3b8;
      --accent: #7c3aed;
      --accent-2: #22c55e;
      --danger: #fb7185;
      --gold: #fbbf24;
      --silver: #cbd5e1;
      --bronze: #fb923c;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,58,237,0.25), transparent 28%),
        radial-gradient(circle at top right, rgba(34,197,94,0.18), transparent 24%),
        linear-gradient(180deg, #08101d 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      width: min(1400px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }
    .hero {
      background: linear-gradient(135deg, rgba(124,58,237,0.24), rgba(15,23,42,0.96));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 26px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }
    .date-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    .update-date {
      font-size: 14px;
      color: var(--text);
    }
    .update-date strong {
      color: var(--gold);
      font-size: 15px;
    }
    .history-select {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .history-select label {
      color: var(--muted);
      font-size: 13px;
    }
    .history-select select {
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .history-select select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .summary .item {
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .summary .item span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .summary .item strong {
      font-size: 24px;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin: 18px 0 22px;
      flex-wrap: wrap;
    }
    .tab {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.78);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      transition: all .2s ease;
    }
    .tab.active {
      background: linear-gradient(135deg, rgba(124,58,237,0.95), rgba(99,102,241,0.92));
      border-color: transparent;
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 24px 0 14px;
    }
    .section-title h2 {
      margin: 0;
      font-size: 24px;
    }
    .section-title span {
      color: var(--muted);
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .card {
      position: relative;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 16px;
      background: linear-gradient(180deg, rgba(15,23,42,0.95), rgba(9,14,28,0.96));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .rank {
      position: absolute;
      top: 14px;
      left: 14px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      z-index: 3;
      color: #0f172a;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
    }
    .rank-1 { background: var(--gold); }
    .rank-2 { background: var(--silver); }
    .rank-3 { background: var(--bronze); }
    .rank-normal { background: #dbeafe; }
    .media-box {
      position: relative;
      display: block;
      height: 220px;
      border-radius: 18px;
      overflow: hidden;
      background: #020617;
      border: 1px solid rgba(148,163,184,.16);
    }
    .media-img, .media-video, .media-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #020617;
    }
    .media-thumb {
      display: none;
    }
    .media-box.thumb-ready .media-thumb {
      display: block;
    }
    .media-box.thumb-ready .media-video {
      display: none;
    }
    .media-video { pointer-events: none; }

    .media-tag {
      position: absolute;
      right: 10px;
      bottom: 10px;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      background: rgba(2,6,23,.68);
      border: 1px solid rgba(255,255,255,.12);
    }
    .media-tag.image { color: #dbeafe; }
    .media-tag.video { color: #fef08a; }
    .play-badge {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 38px;
      color: rgba(255,255,255,.92);
      text-shadow: 0 10px 24px rgba(0,0,0,.42);
      pointer-events: none;
    }
    .content {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .category-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(124,58,237,.16);
      border: 1px solid rgba(124,58,237,.32);
      color: #ddd6fe;
    }
    .origin-rank {
      color: var(--muted);
      font-size: 12px;
    }
    .name {
      margin: 0 0 10px;
      line-height: 1.5;
      font-size: 20px;
    }
    .spu {
      color: #cbd5e1;
      line-height: 1.7;
      font-size: 14px;
      margin-bottom: 16px;
      padding: 12px 14px;
      background: rgba(15,23,42,.68);
      border: 1px solid rgba(148,163,184,.12);
      border-radius: 14px;
      word-break: break-all;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric {
      background: rgba(15,23,42,.72);
      border: 1px solid rgba(148,163,184,.12);
      border-radius: 14px;
      padding: 12px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .metric strong {
      font-size: 20px;
      line-height: 1;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: auto;
      flex-wrap: wrap;
    }
    .action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      border: 1px solid transparent;
    }
    .action.primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
    }
    .action.ghost {
      color: var(--muted);
      border-color: rgba(148,163,184,.18);
      background: rgba(15,23,42,.4);
    }
    .hidden { display: none !important; }
    .footnote {
      margin-top: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
      border-top: 1px dashed rgba(148,163,184,.18);
      padding-top: 16px;
    }
    @media (max-width: 1100px) {
      .grid { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .wrap { width: min(100vw - 20px, 1400px); }
      .card { grid-template-columns: 1fr; }
      .media-box { height: 260px; }
      .metrics { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>珠宝配饰行业跑品榜单</h1>
      <p>每周一、三、五更新榜单</p>
      <div class="date-bar">
        <span class="update-date">📅 数据更新日期：<strong id="currentDate">2026-05-25</strong></span>
        <div class="history-select">
          <label for="historyPicker">历史榜单：</label>
          <select id="historyPicker" onchange="loadHistory(this.value)">
          <option value="" selected>2026-05-25（当前）</option>
          <option value="2026-05-21">2026-05-21</option>
          <option value="2026-05-17">2026-05-17</option>
          <option value="2026-05-14">2026-05-14</option>

          <option value="2026-05-06">2026-05-06</option>

          <option value="2026-04-24">2026-04-24</option>
          <option value="2026-04-23">2026-04-23</option>
          <option value="2026-04-20">2026-04-20</option>
          <option value="2026-04-17">2026-04-17</option>
          <option value="2026-04-16">2026-04-16</option>
          <option value="2026-04-15">2026-04-15</option>
          <option value="2026-04-13">2026-04-13</option>
          <option value="2026-04-10">2026-04-10</option>
          <option value="2026-04-08">2026-04-08</option>
          <option value="2026-04-06">2026-04-06</option>
          <option value="2026-04-01">2026-04-01</option>
          <option value="2026-03-30">2026-03-30</option>

      <div class="summary">

        <div class="item"><span>配饰商品</span><strong>0</strong></div>

    <div class="tabs">

    <section class="panel" data-panel="配饰">

    <div class="footnote">
      说明：1）商品名称已自动去重，重复商品仅保留消耗排序更靠前的一条；2）素材链接按钮均可直接打开原始素材；3）视频素材会优先在视频多个位置里自动挑选更贴近商品主体的代表画面；若浏览器受跨域限制无法生成缩略图，则回退到视频中段画面。

  <script>
    // 历史记录加载
    const CURRENT_DATE = '2026-05-25';
    const historyPicker = document.getElementById('historyPicker');

    async function loadHistoryIndex() {
      try {
        const res = await fetch('history/index.json?t=' + Date.now());
        if (!res.ok) return;
        const dates = await res.json();
        dates.forEach(d => {
          if (d === CURRENT_DATE) return;
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          historyPicker.appendChild(opt);
        });
      } catch (e) { console.warn('加载历史索引失败', e); }
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderHistoryCard(item, rank) {
      const rawLink = item.videoSrc || item.imgSrc || '';
      const link = escHtml(rawLink);
      const isVideo = !!item.videoSrc;
      const nameEsc = escHtml(item.name);
      const mediaHtml = isVideo
        ? '<a class="media-box video-box" href="' + link + '" target="_blank" rel="noopener noreferrer" title="点击打开素材"><img class="media-thumb" alt="' + nameEsc + '" loading="lazy" referrerpolicy="no-referrer" /><video class="media-video" src="' + link + '" muted playsinline preload="auto" data-smart-thumb="true" crossorigin="anonymous"></video><span class="play-badge">&#9654;</span><span class="media-tag video">视频商品图</span></a>'
        : '<a class="media-box" href="' + link + '" target="_blank" rel="noopener noreferrer" title="点击打开素材"><img class="media-img" src="' + link + '" alt="' + nameEsc + '" loading="lazy" referrerpolicy="no-referrer" /><span class="media-tag image">图片商品图</span></a>';
      const rankClass = rank <= 3 ? 'rank-' + rank : 'rank-normal';
      let category = item.category || '';
      let spuId = item.spuId || '';
      if (!category && typeof item.spu === 'string' && item.spu.indexOf('\n') >= 0) {
        const parts = item.spu.split('\n');
        spuId = spuId || parts[0] || '';
        category = parts[1] || '';
      }
      spuId = spuId || (typeof item.spu === 'string' ? item.spu.split('\n')[0] : '');
      const originRankHtml = (item.rank !== undefined) ? '<span class="origin-rank">原始排序 #' + item.rank + '</span>' : '';
      const spuHtml = (spuId || category) ? '<div class="spu">' + escHtml(spuId) + '<br/>' + escHtml(category) + '</div>' : '';
      const refundRaw = String(item.refund == null ? '' : item.refund);
      const refundTxt = refundRaw === '' ? '' : (/%$/.test(refundRaw) ? escHtml(refundRaw) : escHtml(refundRaw) + '%');
      const ghostLabel = isVideo ? '视频直链' : '图片直链';
      return '<article class="card" data-category="' + escHtml(category) + '"><div class="rank ' + rankClass + '">' + rank + '</div>' + mediaHtml + '<div class="content"><div class="category-row"><span class="pill">' + escHtml(category) + '</span>' + originRankHtml + '</div><h3 class="name">' + nameEsc + '</h3>' + spuHtml + '<div class="metrics"><div class="metric"><span>下单单价(元)</span><strong>' + escHtml(item.price) + '</strong></div><div class="metric"><span>24小时发起退款率</span><strong>' + refundTxt + '</strong></div></div><div class="actions"><a class="action primary" href="' + link + '" target="_blank" rel="noopener noreferrer">打开素材</a><span class="action ghost">' + ghostLabel + '</span></div></div></article>';
    }

    async function loadHistory(date) {
      if (!date) { location.reload(); return; }
      try {
        const res = await fetch('history/' + date + '.json?t=' + Date.now());
        if (!res.ok) { alert('无法加载 ' + date + ' 的历史数据'); return; }
        const data = await res.json();
        document.getElementById('currentDate').textContent = data.updateDate || date;
        const cats = ['配饰', '眼镜', '皮带'];
        cats.forEach(cat => {
          const panel = document.querySelector('[data-panel="' + cat + '"]');
          if (!panel) return;
          const grid = panel.querySelector('.grid');
          if (!grid) return;
          const items = (data.groups && data.groups[cat]) || [];
          grid.innerHTML = items.map((item, i) => renderHistoryCard(item, i + 1)).join('');
        });
        const allPanel = document.querySelector('[data-panel="全部"]');
        if (allPanel) {
          const allGrid = allPanel.querySelector('.grid');
          if (allGrid) {
            let allItems = [];
            cats.forEach(cat => { allItems = allItems.concat((data.groups && data.groups[cat]) || []); });
            allGrid.innerHTML = allItems.map((item, i) => renderHistoryCard(item, i + 1)).join('');
          }
        }
        // 更新统计数字
        const summaryItems = document.querySelectorAll('.summary .item strong');
        if (summaryItems.length >= 4) {
          const total = cats.reduce((s, c) => s + ((data.groups && data.groups[c]) || []).length, 0);
          summaryItems[0].textContent = total;
          summaryItems[1].textContent = ((data.groups && data.groups['配饰']) || []).length;
          summaryItems[2].textContent = ((data.groups && data.groups['眼镜']) || []).length;
          summaryItems[3].textContent = ((data.groups && data.groups['皮带']) || []).length;
        }
      } catch (e) { alert('加载历史数据失败: ' + e.message); }
    }

    loadHistoryIndex();

    const tabs = Array.from(document.querySelectorAll('.tab'));
    const panels = Array.from(document.querySelectorAll('.panel'));
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const filter = tab.dataset.filter;
        tabs.forEach(t => t.classList.toggle('active', t === tab));
        panels.forEach(panel => {
          if (filter === '全部') {
            panel.classList.toggle('hidden', panel.dataset.panel !== '全部');
          } else {
            panel.classList.toggle('hidden', panel.dataset.panel !== filter);
          }
        });
      });
    });

    function waitForEvent(target, eventName, timeout = 8000) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('wait ' + eventName + ' timeout')), timeout);

        target.addEventListener(eventName, () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
      });
    }

    function sampleFrameScore(ctx, width, height) {
      const { data } = ctx.getImageData(0, 0, width, height);
      let sumLum = 0;
      let sumLum2 = 0;
      let colorfulness = 0;
      let centerColor = 0;
      let darkPenalty = 0;
      let brightPenalty = 0;
      let count = 0;
      for (let y = 0; y < height; y += 4) {
        for (let x = 0; x < width; x += 4) {
          const idx = (y * width + x) * 4;
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];
          const lum = 0.299 * r + 0.587 * g + 0.114 * b;
          const color = Math.abs(r - g) + Math.abs(g - b) + Math.abs(b - r);
          sumLum += lum;
          sumLum2 += lum * lum;
          colorfulness += color;
          if (x > width * 0.22 && x < width * 0.78 && y > height * 0.18 && y < height * 0.82) {
            centerColor += color;
          }
          if (lum < 28) darkPenalty += 1;
          if (lum > 240) brightPenalty += 1;
          count += 1;
        }
      }
      if (!count) return -Infinity;
      const avgLum = sumLum / count;
      const variance = sumLum2 / count - avgLum * avgLum;
      const avgColor = colorfulness / count;
      const centerBoost = centerColor / Math.max(1, count * 0.45);
      const darkness = darkPenalty / count;
      const brightness = brightPenalty / count;
      return variance * 0.55 + avgColor * 0.8 + centerBoost * 0.65 - darkness * 180 - brightness * 140;
    }

    async function ensureMetadata(video) {
      if (video.readyState >= 1 && Number.isFinite(video.duration)) return;
      video.load();
      await waitForEvent(video, 'loadedmetadata', 12000).catch(() => null);
    }

    async function seekVideo(video, time) {
      return new Promise(resolve => {
        const done = () => {
          video.pause();
          resolve();
        };
        video.addEventListener('seeked', done, { once: true });
        try {
          video.currentTime = time;
        } catch (e) {
          resolve();
        }
      });
    }

    async function buildSmartVideoThumb(video) {
      const box = video.closest('.media-box');
      const thumb = box ? box.querySelector('.media-thumb') : null;
      if (!box) return;
      try {
        video.muted = true;
        video.playsInline = true;
        await ensureMetadata(video);
        const duration = Number.isFinite(video.duration) && video.duration > 0 ? video.duration : 0;
        const fallbackTime = duration > 0 ? Math.min(Math.max(duration * 0.35, 0.15), Math.max(0.15, duration - 0.15)) : 0.1;
        const points = duration > 1
          ? [0.12, 0.2, 0.32, 0.45, 0.58, 0.72, 0.84].map(r => Math.min(Math.max(duration * r, 0.15), Math.max(0.15, duration - 0.15)))
          : [fallbackTime];

        const canvas = document.createElement('canvas');
        const width = 180;
        const height = 180;
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let best = null;
        let crossOriginBlocked = false;

        for (const time of points) {
          await seekVideo(video, time);
          await new Promise(r => setTimeout(r, 80));
          try {
            ctx.drawImage(video, 0, 0, width, height);
            const score = sampleFrameScore(ctx, width, height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.86);
            if (!best || score > best.score) {
              best = { score, dataUrl, time };
            }
          } catch (err) {
            crossOriginBlocked = true;
            break;
          }
        }

        if (best && thumb) {
          thumb.src = best.dataUrl;
          box.classList.add('thumb-ready');
          await seekVideo(video, best.time);
          return;
        }

        await seekVideo(video, fallbackTime);
        if (crossOriginBlocked) {
          box.title = '浏览器限制了视频画面抓图，已回退为视频中段商品画面';
        }
      } catch (e) {
        console.warn('smart video thumb failed', e);
        try {
          if (Number.isFinite(video.duration) && video.duration > 0) {
            await seekVideo(video, Math.min(Math.max(video.duration * 0.35, 0.15), Math.max(0.15, video.duration - 0.15)));
          }
        } catch (err) {}
      }
    }

    document.querySelectorAll('video[data-smart-thumb="true"]').forEach(buildSmartVideoThumb);
  </script>
